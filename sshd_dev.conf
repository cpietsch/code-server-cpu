# Dev-container SSH hardening.
# Password login is disabled; authorized_keys is the only way in.
# The container is only reachable via Tailscale (network_mode service:tailscale),
# so exposing port 22 in the container is fine.

Port 22
AddressFamily any
ListenAddress 0.0.0.0
ListenAddress ::

PermitRootLogin no
PasswordAuthentication no
ChallengeResponseAuthentication no
KbdInteractiveAuthentication no
UsePAM yes
PubkeyAuthentication yes
AuthorizedKeysFile .ssh/authorized_keys

X11Forwarding no
AllowAgentForwarding yes
AllowTcpForwarding yes
PrintMotd no
AcceptEnv LANG LC_* TERM COLORTERM
ClientAliveInterval 60
ClientAliveCountMax 3
